# ================================================================
# Pure 主题配置
# ================================================================

# 网站图标路径（相对于 source/ 目录）
favicon: /favicon.ico

# Logo 图片路径；留空则显示站点标题文字
logo: /img/zcxx0322.png

# ----------------------------------------------------------------
# 导航菜单（名称: 路径）
# ----------------------------------------------------------------
menu:
  首页: /
  归档: /archives
  标签: /tags
  分类: /categories
  关于: /about

# ----------------------------------------------------------------
# 社交链接（显示在页脚；留空则隐藏）
# ----------------------------------------------------------------
social:
  github: https://github.com/Zcxx0322
  twitter:
  email: 
  rss: 

# ----------------------------------------------------------------
# 文章设置
# ----------------------------------------------------------------
post:
  excerpt_length: 200        # 无 <!-- more --> 时自动截取的摘要长度（字符数）
  show_updated: true        # 是否在文章底部显示"最后更新"时间
  copyright: true            # 是否在文章底部显示版权声明
  copyright_text: "转载请注明出处。"
  series:
    enable: true             # 是否启用文章系列导航
  outdated:
    enable: true             # 是否启用文章时效提醒
    days: 365                # 发布时间超过多少天后提醒
    basis: date              # date（发布时间）| updated（更新时间）
    message: "技术细节可能随版本变化，请结合当前环境验证。"

# ----------------------------------------------------------------
# 文章目录（TOC）
# ----------------------------------------------------------------
toc:
  enable: true
  max_depth: 3               # 目录最大层级（1-6）
  number: false              # 是否为标题添加序号前缀

# ----------------------------------------------------------------
# 代码高亮（使用 Hexo 内置 highlight.js）
# ----------------------------------------------------------------
highlight:
  enable: true
  theme: atom-one-dark       # 任意 highlight.js 主题名，参考 https://highlightjs.org/demo
  copy_button: true          # 是否显示一键复制按钮

# ----------------------------------------------------------------
# 数学公式渲染
# ----------------------------------------------------------------
math:
  enable: false
  engine: katex              # katex | mathjax

# ----------------------------------------------------------------
# 图片灯箱（点击放大，纯 JS 无依赖）
# ----------------------------------------------------------------
lightbox:
  enable: true

# ----------------------------------------------------------------
# 本地搜索（需安装 hexo-generator-search 插件）
# ----------------------------------------------------------------
search:
  enable: true
  path: search.xml           # 搜索索引文件路径
  field: post                # 索引范围：post | page | all
  content: true              # 是否索引文章正文内容

# ----------------------------------------------------------------
# 评论系统（将 enable 设为 true 并选择一个 provider）
# ----------------------------------------------------------------
comments:
  enable: true
  provider: giscus           # giscus | waline | disqus | valine

  # Giscus（基于 GitHub Discussions），前往 https://giscus.app 获取参数
  giscus:
    repo: "Zcxx0322/Zcxx0322.github.io"
    repo_id: "R_kgDOQev4PQ"
    category: "Announcements"
    category_id: "DIC_kwDOQev4Pc4C97e7"
    mapping: pathname
    reactions_enabled: 1
    emit_metadata: 0
    theme: preferred_color_scheme
    lang: zh-CN

  # Waline（自托管评论系统）
  waline:
    server_url: ""
    lang: zh-CN
    comment_count: true
    page_view: false

  # Disqus
  disqus:
    shortname: ""

  # Valine（基于 LeanCloud）
  valine:
    app_id: ""
    app_key: ""
    placeholder: "说点什么吧…"
    avatar: mm
    lang: zh-CN

# ----------------------------------------------------------------
# 站点统计
# ----------------------------------------------------------------
analytics:
  google:
    enable: false
    id: ""                   # Google Analytics 跟踪 ID，格式：G-XXXXXXXXXX
  baidu:
    enable: false
    id: ""                   # 百度统计 ID
  umami:
    enable: false
    src: ""                  # Umami 脚本地址，如 https://umami.example.com/script.js
    website_id: ""           # Umami 网站 ID

# ----------------------------------------------------------------
# 深色模式
# ----------------------------------------------------------------
dark_mode:
  enable: true
  default: auto              # auto（跟随系统）| light（始终浅色）| dark（始终深色）

# ----------------------------------------------------------------
# 页脚
# ----------------------------------------------------------------
footer:
  since: 2024                # 建站年份，用于显示版权年份范围
  custom_text: ""            # 自定义页脚内容（支持 HTML）
  icp: ""                    # ICP 备案号（中国大陆站点）

# ----------------------------------------------------------------
# 关于页（layout: about）
# ----------------------------------------------------------------
about:
  avatar: /img/zcxx0322.png  # 头像图片路径，如 /images/avatar.jpg
  name: "Zcxx0322"           # 显示名称，留空则使用站点 author
  bio: ""                    # 个人简介
  links:                     # 联系方式链接（留空则隐藏对应按钮）
    github: "https://github.com/Zcxx0322"  # GitHub 主页地址
    email: "3611744356@qq.com"                # 邮箱地址（不含 mailto:）
    twitter: ""              # Twitter / X 主页地址
    website: ""              # 个人网站地址

# ----------------------------------------------------------------
# CDN 覆盖（留空则使用内置默认值）
# ----------------------------------------------------------------
cdn:
  highlight_css: ""          # 自定义 highlight.js 样式 CDN 地址
  katex_css: ""              # 自定义 KaTeX 样式 CDN 地址
  katex_js: ""               # 自定义 KaTeX 脚本 CDN 地址
